# Netlify deployment config for Busara
# https://docs.netlify.com/integrations/frameworks/next-js/overview/

[build]
  command = "npx prisma generate && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # Placeholder DB URLs for prisma generate during build (doesn't connect).
  # Override these in the Netlify dashboard with your real Supabase URLs.
  DATABASE_URL = "postgresql://placeholder:placeholder@localhost:5432/placeholder"
  DIRECT_URL = "postgresql://placeholder:placeholder@localhost:5432/placeholder"
  JWT_SECRET = "build-placeholder-not-used-at-runtime"
  NEXT_PUBLIC_APP_URL = "https://busara-ai.netlify.app"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Increase timeout for the analyze endpoint (runs 23 agents)
  max_duration = 60

# PWA manifest headers
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

# Long-cache static icons
[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
