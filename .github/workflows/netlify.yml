name: Build and Deploy to Netlify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress runs for the same ref
concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-placeholder-not-used-at-runtime' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://busaraai.com' }}

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Deploy to Netlify
        run: |
          # List available sites and extract the first site_id
          # This handles the case where NETLIFY_SITE_ID might be incorrect
          echo "Listing available Netlify sites..."
          SITES_JSON=$(netlify api listSites --auth "${NETLIFY_AUTH_TOKEN}" 2>&1)

          # Extract the first site_id from the response
          FIRST_SITE_ID=$(echo "$SITES_JSON" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              if isinstance(data, list) and len(data) > 0:
                  print(data[0].get('site_id', data[0].get('id', '')))
              else:
                  print('')
          except:
              print('')
          " 2>/dev/null)

          if [ -z "$FIRST_SITE_ID" ]; then
            echo "::error::No Netlify sites found for this auth token."
            echo "::error::Create a site at https://app.netlify.com/start first."
            exit 1
          fi

          echo "Found Netlify site: $FIRST_SITE_ID"
          echo "Configured NETLIFY_SITE_ID: ${NETLIFY_SITE_ID:-<not set>}"

          # Use the configured site ID if it matches, otherwise use the first available
          if [ -n "${NETLIFY_SITE_ID}" ] && echo "$SITES_JSON" | grep -q "${NETLIFY_SITE_ID}"; then
            DEPLOY_SITE_ID="${NETLIFY_SITE_ID}"
            echo "Using configured NETLIFY_SITE_ID (verified)"
          else
            DEPLOY_SITE_ID="$FIRST_SITE_ID"
            echo "::warning::Configured NETLIFY_SITE_ID not found in site list. Using first available site: $DEPLOY_SITE_ID"
            echo "::warning::Update NETLIFY_SITE_ID secret to: $DEPLOY_SITE_ID"
          fi

          # Create .netlify/state.json to link the site
          mkdir -p .netlify
          cat > .netlify/state.json << EOF
          {
            "siteId": "${DEPLOY_SITE_ID}"
          }
          EOF

          # Deploy
          netlify deploy \
            --dir=.next \
            --prod \
            --auth "${NETLIFY_AUTH_TOKEN}" \
            --site "${DEPLOY_SITE_ID}" \
            --message "Deploy from ${{ github.event.head_commit.message || 'GitHub Actions' }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
