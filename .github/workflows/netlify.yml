name: Build and Deploy to Netlify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress runs for the same ref
concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-placeholder-not-used-at-runtime' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://busaraai.com' }}

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Verify Netlify credentials
        run: |
          # Debug: show length of secrets (not the values themselves)
          echo "NETLIFY_SITE_ID length: ${#NETLIFY_SITE_ID}"
          echo "NETLIFY_AUTH_TOKEN length: ${#NETLIFY_AUTH_TOKEN}"

          if [ ${#NETLIFY_SITE_ID} -lt 10 ]; then
            echo "::error::NETLIFY_SITE_ID appears to be empty or too short. It should be a UUID like 'abc12345-1234-1234-1234-abc123456789'"
            echo "::error::Find it at: Netlify dashboard → Site settings → General → Site details → API ID"
            exit 1
          fi

          if [ ${#NETLIFY_AUTH_TOKEN} -lt 10 ]; then
            echo "::error::NETLIFY_AUTH_TOKEN appears to be empty or too short."
            echo "::error::Generate one at: https://app.netlify.com/user/applications#personal-access-tokens"
            exit 1
          fi

          # List sites to verify the auth token works
          echo "Verifying auth token by listing sites..."
          netlify api listSites --auth "${NETLIFY_AUTH_TOKEN}" 2>&1 | head -20 || {
            echo "::error::Auth token verification failed. The token may be expired or invalid."
            exit 1
          }
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify
        run: |
          # Create a .netlify/state.json file to link the site explicitly
          mkdir -p .netlify
          cat > .netlify/state.json << EOF
          {
            "siteId": "${NETLIFY_SITE_ID}"
          }
          EOF

          # Deploy using Netlify CLI
          # The .netlify/state.json file links this directory to the Netlify site
          netlify deploy \
            --dir=.next \
            --prod \
            --auth "${NETLIFY_AUTH_TOKEN}" \
            --message "Deploy from ${{ github.event.head_commit.message || 'GitHub Actions' }}" \
            2>&1 || {
              echo "::error::Deploy failed. The NETLIFY_SITE_ID may be incorrect."
              echo "::error::Verify the Site ID at: Netlify dashboard → Site settings → General → Site details → API ID"
              echo "::error::It should look like: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
              exit 1
            }
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
