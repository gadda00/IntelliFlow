name: Build and Deploy to Netlify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress runs for the same ref
concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Detect Netlify Site ID
        run: |
          # List available sites and extract the first site_id
          echo "Listing available Netlify sites..."
          SITES_JSON=$(netlify api listSites --auth "${NETLIFY_AUTH_TOKEN}" 2>&1)

          FIRST_SITE_ID=$(echo "$SITES_JSON" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              if isinstance(data, list) and len(data) > 0:
                  print(data[0].get('site_id', data[0].get('id', '')))
              else:
                  print('')
          except:
              print('')
          " 2>/dev/null)

          if [ -z "$FIRST_SITE_ID" ]; then
            echo "::error::No Netlify sites found for this auth token."
            echo "::error::Create a site at https://app.netlify.com/start first."
            exit 1
          fi

          echo "Found Netlify site: $FIRST_SITE_ID"

          if [ -n "${NETLIFY_SITE_ID}" ] && echo "$SITES_JSON" | grep -q "${NETLIFY_SITE_ID}"; then
            DEPLOY_SITE_ID="${NETLIFY_SITE_ID}"
            echo "Using configured NETLIFY_SITE_ID (verified)"
          else
            DEPLOY_SITE_ID="$FIRST_SITE_ID"
            echo "::warning::Configured NETLIFY_SITE_ID not found. Using: $DEPLOY_SITE_ID"
          fi

          echo "DEPLOY_SITE_ID=$DEPLOY_SITE_ID" >> $GITHUB_ENV

          mkdir -p .netlify
          cat > .netlify/state.json << EOF
          {
            "siteId": "${DEPLOY_SITE_ID}"
          }
          EOF
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Build and Deploy to Netlify
        run: |
          # Use 'netlify deploy --build' which:
          # 1. Runs 'netlify build' (invokes @netlify/plugin-nextjs to process .next)
          # 2. Deploys the processed output to Netlify
          #
          # This is critical: just uploading .next/ doesn't work because
          # @netlify/plugin-nextjs needs to transform Next.js output into
          # Netlify serverless functions during the build step.
          netlify deploy \
            --build \
            --prod \
            --auth "${NETLIFY_AUTH_TOKEN}" \
            --site "${DEPLOY_SITE_ID}" \
            --message "Deploy from ${{ github.event.head_commit.message || 'GitHub Actions' }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-placeholder-not-used-at-runtime' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://busaraai.com' }}
          NEXT_TELEMETRY_DISABLED: '1'
