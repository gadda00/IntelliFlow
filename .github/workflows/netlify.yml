name: Build and Deploy to Netlify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress runs for the same ref
concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-placeholder-not-used-at-runtime' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://busaraai.com' }}

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Deploy to Netlify
        run: |
          # Verify secrets are set
          if [ -z "${NETLIFY_AUTH_TOKEN}" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN secret is not set. Please add it in GitHub Settings > Secrets and variables > Actions"
            exit 1
          fi
          if [ -z "${NETLIFY_SITE_ID}" ]; then
            echo "::error::NETLIFY_SITE_ID secret is not set. Please add it in GitHub Settings > Secrets and variables > Actions"
            exit 1
          fi

          # Deploy using Netlify CLI with explicit site and auth
          # The --site flag specifies the site ID directly
          # The netlify.toml in the repo configures @netlify/plugin-nextjs
          netlify deploy \
            --site "${NETLIFY_SITE_ID}" \
            --auth "${NETLIFY_AUTH_TOKEN}" \
            --dir=.next \
            --prod \
            --message "Deploy from ${{ github.event.head_commit.message || 'GitHub Actions' }}" \
            2>&1 || {
              echo "::error::Deploy failed. Common causes:"
              echo "::error::1. NETLIFY_SITE_ID is incorrect — find it in Netlify dashboard > Site settings > General > Site details > API ID"
              echo "::error::2. NETLIFY_AUTH_TOKEN is expired — regenerate at https://app.netlify.com/user/applications#personal-access-tokens"
              echo "::error::3. The auth token's user doesn't have access to the site"
              exit 1
            }
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
