name: Build Android App (APK + AAB)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pwa_url:
        description: 'Deployed PWA URL (e.g., https://busara.netlify.app)'
        required: true
        default: 'https://busara.netlify.app'

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Determine PWA URL
        id: pwa-url
        run: |
          if [ -n "${{ github.event.inputs.pwa_url }}" ]; then
            echo "url=${{ github.event.inputs.pwa_url }}" >> $GITHUB_OUTPUT
          else
            # Default to Netlify URL — update this after your first deploy
            echo "url=https://busara.netlify.app" >> $GITHUB_OUTPUT
          fi

      - name: Initialize TWA project
        run: |
          mkdir -p android-twa-build
          cd android-twa-build
          bubblewrap init \
            --manifest ${{ steps.pwa-url.outputs.url }}/manifest.json \
            --name "Busara" \
            --packageId "ai.busara.app" \
            --skip-https-validation || true

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.AKILI_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android-twa-build/busara-release.keystore
            echo "KEYSTORE_PATH=busara-release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_ALIAS=${{ secrets.AKILI_KEYSTORE_ALIAS }}" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.AKILI_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.AKILI_KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "No signing keystore provided — using debug signing"
          fi

      - name: Build APK and AAB
        working-directory: android-twa-build
        run: |
          if [ -n "$KEYSTORE_PATH" ]; then
            bubblewrap build --signing-key-path=$KEYSTORE_PATH \
              --signing-key-alias=$KEYSTORE_ALIAS \
              --signing-key-password=$KEYSTORE_PASSWORD \
              --keystore-password=$KEYSTORE_PASSWORD
          else
            bubblewrap build
          fi

      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          find android-twa-build -name "*.apk" -exec cp {} artifacts/busara-release.apk \;
          find android-twa-build -name "*.aab" -exec cp {} artifacts/busara-release.aab \;
          ls -la artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: busara-apk
          path: artifacts/busara-release.apk
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: busara-aab
          path: artifacts/busara-release.aab
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/busara-release.apk
            artifacts/busara-release.aab
          draft: true
          name: Busara ${{ github.ref_name }}
          body: |
            ## Busara ${{ github.ref_name }}

            ### Downloads
            - **APK** (for testing): `busara-release.apk`
            - **AAB** (for Play Store): `busara-release.aab`

            ### Install APK on a device
            ```bash
            adb install busara-release.apk
            ```

            ### Upload AAB to Play Store
            1. Go to https://play.google.com/console
            2. Select Busara → Production → Create release
            3. Upload `busara-release.aab`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
